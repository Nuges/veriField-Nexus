version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: rc1_user
      POSTGRES_PASSWORD: rc1_password
      POSTGRES_DB: verifield_rc1
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rc1_user -d verifield_rc1"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cios_net

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cios_net

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1884:1883"
      - "9002:9001"
    command: mosquitto -c /mosquitto-no-auth.conf
    volumes:
      - ./mosquitto.conf:/mosquitto-no-auth.conf
    networks:
      - cios_net

networks:
  cios_net:
    driver: bridge
