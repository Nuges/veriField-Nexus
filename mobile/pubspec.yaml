name: verifield_nexus
description: "VeriField Nexus — Field data collection and verification for climate projects"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # --- State Management ---
  flutter_riverpod: ^2.6.1

  # --- Navigation ---
  go_router: ^14.8.1

  # --- Supabase (Auth + Storage) ---
  supabase_flutter: ^2.9.0

  # --- Local Storage (Offline-first) ---
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3

  # --- Camera & Media ---
  image_picker: ^1.1.2

  # --- Location Services ---
  geolocator: ^13.0.2

  # --- Network Monitoring ---
  connectivity_plus: ^6.1.4

  # --- UI/UX ---
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  gap: ^3.0.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  fl_chart: ^0.70.2

  # --- Utilities ---
  uuid: ^4.5.1
  crypto: ^3.0.6
  intl: ^0.20.2
  http: ^1.3.0
  json_annotation: ^4.9.0

  # --- Icons ---
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
